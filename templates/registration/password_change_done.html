{% extends 'base.html' %}
{% block title %}Parol yangilandi{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: #f9f9f7;">
  <div style="width: 100%; max-width: 420px;">

    <div style="background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; overflow: hidden;">

      <div style="padding: 2.5rem 2rem 1.75rem; text-align: center;">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: #eaf3de; border: 1px solid #c0dd97; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; color: #3b6d11; font-size: 22px; font-weight: 500;">
          ✓
        </div>
        <h1 style="font-size: 19px; font-weight: 500; margin: 0 0 10px;">Parol muvaffaqiyatli o'zgardi!</h1>
        <p style="font-size: 14px; color: #666; margin: 0; line-height: 1.7;">Hisobingiz yangi parol bilan himoyalandi.</p>
      </div>

      <div style="padding: 0 2rem 2rem; display: flex; gap: 10px;">
        <a href="{% url 'home_page' %}" style="flex: 1; display: block; text-align: center; padding: 10px; font-size: 13px; font-weight: 500; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #111; text-decoration: none;">
          Bosh sahifa
        </a>
        <a href="{% url 'profile' %}" style="flex: 1; display: block; text-align: center; padding: 10px; font-size: 13px; font-weight: 500; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #111; text-decoration: none;">
          Profil
        </a>
      </div>

    </div>

  </div>
</div>
{% endblock %}
