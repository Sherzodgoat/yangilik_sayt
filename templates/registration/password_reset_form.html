{% extends 'base.html' %}
{% block title %}Parolni tiklash{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: #f9f9f7;">
  <div style="width: 100%; max-width: 420px;">

    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="width: 56px; height: 56px; border-radius: 50%; background: #fff; border: 1px solid #e5e5e0; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
        🔒
      </div>
      <h1 style="font-size: 20px; font-weight: 500; margin: 0 0 6px;">Parolni tiklash</h1>
      <p style="font-size: 14px; color: #888; margin: 0; line-height: 1.6;">Email manzilingizni kiriting, tiklash havolasini yuboramiz.</p>
    </div>

    <div style="background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 1.75rem;">
      <form method="post">
        {% csrf_token %}

        <div style="margin-bottom: 1.25rem;">
          <label style="display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px;">Email manzil</label>
          {{ form.email }}
        </div>

        <button type="submit" style="width: 100%; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #111;">
          Email yuborish
        </button>
      </form>
    </div>

    <p style="text-align: center; font-size: 13px; color: #888; margin-top: 1.25rem;">
      Parolingizni esladingizmi?
      <a href="{% url 'login' %}" style="color: #111; text-decoration: underline;">Kirish</a>
    </p>

  </div>
</div>
{% endblock %}
