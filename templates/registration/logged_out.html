{% extends 'base.html' %}
{% block title %}Logout page{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: #f9f9f7;">
  <div style="width: 100%; max-width: 400px;">

    <div style="background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; overflow: hidden;">

      <div style="padding: 2.5rem 2rem; text-align: center;">
        <div style="width: 52px; height: 52px; border-radius: 50%; background: #faeeda; border: 1px solid #fac775; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 20px;">
          🚪
        </div>
        <h1 style="font-size: 19px; font-weight: 500; margin: 0 0 8px;">Rostan ham chiqmoqchimisiz?</h1>
        <p style="font-size: 14px; color: #888; margin: 0; line-height: 1.6;">Hisobingizdan chiqib ketasiz.</p>
      </div>

      <div style="padding: 0 2rem 2rem; display: flex; gap: 10px;">
        <a href="{% url 'home_page' %}" style="flex: 1; display: block; text-align: center; padding: 10px; font-size: 14px; font-weight: 500; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #111; text-decoration: none;">
          Yo'q
        </a>
        <form action="{% url 'logout' %}" method="post" style="flex: 1;">
          {% csrf_token %}
          <button type="submit" style="width: 100%; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 8px; border: 1px solid #f7c1c1; background: #fcebeb; color: #a32d2d;">
            Ha, chiqish
          </button>
        </form>
      </div>

    </div>

  </div>
</div>
{% endblock %}
