{% extends 'base.html' %}
{% block title %}Parolni yangilash{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: #f9f9f7;">
  <div style="width: 100%; max-width: 420px;">

    <div style="background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; overflow: hidden;">

      <div style="padding: 2.5rem 2rem; text-align: center;">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: #eaf3de; border: 1px solid #c0dd97; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 22px;">
          ✓
        </div>
        <h1 style="font-size: 19px; font-weight: 500; margin: 0 0 10px;">Xabar yuborildi</h1>
        <p style="font-size: 14px; color: #666; margin: 0; line-height: 1.7;">
          Parolni tiklash havolasi email manzilingizga yuborildi. Pochta qutingizni tekshiring.
        </p>
      </div>

      <div style="border-top: 1px solid #e5e5e0; padding: 1.25rem 2rem; background: #f9f9f7;">
        <p style="font-size: 13px; color: #888; margin: 0 0 10px; line-height: 1.6;">Xabar kelmadimi?</p>
        <a href="{% url 'password_reset' %}"
           style="display: block; text-align: center; padding: 9px 16px; font-size: 13px; font-weight: 500; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #111; text-decoration: none;">
          Qayta yuborish
        </a>
      </div>

    </div>

    <p style="text-align: center; font-size: 13px; color: #888; margin-top: 1.25rem;">
      <a href="{% url 'login' %}" style="color: #111; text-decoration: underline;">Kirish sahifasiga qaytish</a>
    </p>

  </div>
</div>
{% endblock %}
